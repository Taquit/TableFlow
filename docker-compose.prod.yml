services:
  db:
    image: postgres:15-alpine
    container_name: pparty-db-prod
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    # Puerto 5432 NO expuesto al exterior, solo accesible entre contenedores
    volumes:
      - pparty_data_prod:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: pparty-backend-prod
    # Puerto 4000 NO expuesto al exterior, nginx hace de proxy
    env_file:
      - .env
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # Con nginx de proxy, el browser llama a la misma IP/dominio sin puerto
        - VITE_API_URL=${FRONTEND_VITE_API_URL}
    container_name: pparty-frontend-prod
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  pparty_data_prod:
