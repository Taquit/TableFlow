services:
  db:
    image: postgres:15-alpine
    container_name: pparty-db-prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pparty
    ports:
      - "5432:5432"
    volumes:
      - pparty_data_prod:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: pparty-backend-prod
    ports:
      - "4000:4000"
    env_file:
      - .env
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # Pasa el API URL al builder de Vite
        - VITE_API_URL=${FRONTEND_VITE_API_URL:-http://localhost:4000/api}
    container_name: pparty-frontend-prod
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  pparty_data_prod:
